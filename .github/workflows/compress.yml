name: ضغط الفيديو

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'رابط الفيديو'
        required: true
      resolution:
        description: 'الدقة (مثلاً 720)'
        required: true
      codec:
        description: 'الكوديك (av1, h265)'
        required: true
      chat_id:
        description: 'معرف الدردشة'
        required: true
      private:
        description: 'خصوصي (true/false)'
        required: true
      filename:
        description: 'اسم الملف المطلوب'
        required: false
        default: ''

concurrency:
  group: video-compression
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  compress:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: تجهيز البيئة
        run: |
          sudo apt update
          sudo apt install -y ffmpeg p7zip-full
          pip install --upgrade --pre yt-dlp python-telegram-bot

      - name: تثبيت Deno
        run: |
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> "$GITHUB_PATH"

      - name: تحميل الفيديو (مع تحديثات SABR وترتيب العملاء المُحسَّن)
        env:
          VIDEO_URL: ${{ github.event.inputs.url }}
          RESOLUTION: ${{ github.event.inputs.resolution }}
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          unset http_proxy https_proxy HTTP_PROXY HTTPS_PROXY no_proxy NO_PROXY
          echo "$YT_COOKIES" > cookies.txt
          yt-dlp -f "bv*[height<=${RESOLUTION}]+ba/b[height<=${RESOLUTION}]/best[height<=${RESOLUTION}]/bv*+ba/best" \
            --extractor-args "youtube:player_client=android,tv,web;formats=missing_pot" \
            --merge-output-format mp4 \
            -o input.mp4 \
            --cookies cookies.txt \
            --user-agent "Mozilla/5.0" \
            --verbose \
            "$VIDEO_URL" 2>&1 | tee ytdlp_log.txt || { echo "❌ فشل التحميل"; exit 1; }
          rm -f cookies.txt
          if [ ! -f input.mp4 ]; then echo "❌ الملف لم يُنشأ"; exit 1; fi
          echo "✅ تم التحميل بنجاح"

      - name: ضغط الفيديو
        env:
          CODEC: ${{ github.event.inputs.codec }}
          RESOLUTION: ${{ github.event.inputs.resolution }}
        run: |
          if [ "$CODEC" = "av1" ]; then CODEC_LIB="libsvtav1"; PRESET="10"
          elif [ "$CODEC" = "h265" ]; then CODEC_LIB="libx265"; PRESET="ultrafast"
          else echo "كوديك غير مدعوم"; exit 1; fi
          ffmpeg -i input.mp4 \
            -vf "scale=trunc(oh*a/2)*2:${RESOLUTION}" \
            -c:v $CODEC_LIB -crf 40 -preset $PRESET \
            -c:a libopus -b:a 16k -ar 48000 -y output.mkv

      - name: تشفير الفيديو (فقط لو خاص)
        if: github.event.inputs.private == 'true'
        id: encrypt
        run: |
          PASSWORD=$(openssl rand -base64 12)
          echo "password=$PASSWORD" >> "$GITHUB_OUTPUT"
          7z a -p"$PASSWORD" -mhe=on output.7z output.mkv

      - name: رفع الملف وإرسال رابط التحميل
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
          PRIVATE: ${{ github.event.inputs.private }}
          PASSWORD: ${{ steps.encrypt.outputs.password }}
          FILENAME: ${{ github.event.inputs.filename }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="video-${{ github.run_id }}"
          if [ "$PRIVATE" == "true" ]; then
            ASSET="output.7z"
          else
            ASSET="output.mkv"
          fi
          if [ -n "$FILENAME" ]; then
            EXT="${ASSET##*.}"
            mv "$ASSET" "${FILENAME}.${EXT}"
            ASSET="${FILENAME}.${EXT}"
          fi
          gh release create "$TAG" "$ASSET" --title "فيديو مضغوط" --notes "تم الإنشاء تلقائياً"
          URL=$(gh release view "$TAG" --json assets -q '.assets[0].url')
          if [ "$PRIVATE" == "true" ]; then
            TEXT="✅ تم الضغط!\n📥 الرابط:\n$URL\n\n🔑 كلمة المرور: $PASSWORD"
          else
            TEXT="✅ تم الضغط!\n📥 رابط التحميل المباشر:\n$URL"
          fi
          python3 << EOF
          import os, asyncio
          from telegram import Bot
          async def main():
              bot = Bot(token=os.environ["BOT_TOKEN"])
              await bot.send_message(chat_id=os.environ["CHAT_ID"], text=os.environ["TEXT"])
          asyncio.run(main())
          EOF

      - name: إرسال سجل التشخيص عند الفشل
        if: failure()
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
        run: |
          python3 << 'EOF'
          import os, asyncio
          from telegram import Bot
          async def main():
              bot = Bot(token=os.environ["BOT_TOKEN"])
              try:
                  with open("ytdlp_log.txt") as f:
                      lines = f.readlines()[-15:]
                  text = "🔍 آخر سطور من سجل التحميل:\n" + "".join(lines)[-3500:]
              except FileNotFoundError:
                  text = "❌ فشل قبل بدء التحميل (ربما مشكلة كوكيز أو اتصال)."
              await bot.send_message(chat_id=os.environ["CHAT_ID"], text=text)
          asyncio.run(main())
          EOF