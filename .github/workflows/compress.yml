name: ضغط الفيديو

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'رابط الفيديو'
        required: true
      resolution:
        description: 'الدقة (مثلاً 720)'
        required: true
      codec:
        description: 'الكوديك (av1, h265, h266)'
        required: true
      chat_id:
        description: 'معرف الدردشة'
        required: true

jobs:
  compress:
    runs-on: ubuntu-latest
    steps:
      - name: تجهيز البيئة
        run: |
          sudo apt update
          sudo apt install -y ffmpeg
          pip install --upgrade yt-dlp python-telegram-bot

      - name: تحميل الفيديو
        env:
          VIDEO_URL: ${{ github.event.inputs.url }}
          RESOLUTION: ${{ github.event.inputs.resolution }}
        run: |
          # 🔥 هذا السطر هو الحل: يحذف أي بروكسي قديم
          unset http_proxy https_proxy HTTP_PROXY HTTPS_PROXY
          echo "بدء تحميل الفيديو..."
          yt-dlp -f "bestvideo[height<=${RESOLUTION}]+bestaudio/best" \
            --merge-output-format mp4 \
            -o input.mp4 \
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
            --verbose \
            "$VIDEO_URL" || {
              echo "❌ فشل التحميل"
              exit 1
            }
          if [ ! -f input.mp4 ]; then
            echo "❌ الملف لم يُنشأ"
            exit 1
          fi
          echo "✅ تم التحميل بنجاح"

      - name: ضغط الفيديو
        env:
          CODEC: ${{ github.event.inputs.codec }}
          RESOLUTION: ${{ github.event.inputs.resolution }}
        run: |
          if [ "$CODEC" = "av1" ]; then
            CODEC_LIB="libsvtav1"
            PRESET="10"
          elif [ "$CODEC" = "h265" ]; then
            CODEC_LIB="libx265"
            PRESET="ultrafast"
          elif [ "$CODEC" = "h266" ]; then
            CODEC_LIB="libvvenc"
            PRESET="faster"
          else
            echo "كوديك غير مدعوم"
            exit 1
          fi

          ffmpeg -i input.mp4 \
            -vf "scale=trunc(oh*a/2)*2:${RESOLUTION}" \
            -c:v $CODEC_LIB \
            -crf 40 \
            -preset $PRESET \
            -c:a libopus \
            -b:a 16k \
            -ar 48000 \
            -y output.mkv

      - name: إرسال الفيديو للمستخدم
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
        run: |
          python3 << 'EOF'
          import os, asyncio
          from telegram import Bot

          BOT_TOKEN = os.environ["BOT_TOKEN"]
          CHAT_ID = os.environ["CHAT_ID"]

          async def main():
              bot = Bot(token=BOT_TOKEN)
              with open("output.mkv", "rb") as f:
                  await bot.send_document(chat_id=CHAT_ID, document=f, caption="✅ تم الضغط بنجاح!")

          asyncio.run(main())
          EOF
